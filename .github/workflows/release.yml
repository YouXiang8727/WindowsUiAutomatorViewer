name: Release Windows App

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        shell: bash

      - name: Build Windows Distributions
        # 同時打包安裝檔 (EXE) 與 免安裝版 (ZIP)
        run: ./gradlew :composeApp:packageExe :composeApp:packageZip

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          # 當推送到 master 時使用 'latest' 標籤，否則使用 Git Tag
          tag_name: ${{ github.ref_name == 'master' && 'latest' || github.ref_name }}
          name: ${{ github.ref_name == 'master' && 'Latest Build' || github.ref_name }}
          files: |
            composeApp/build/compose/binaries/main/exe/*.exe
            composeApp/build/compose/binaries/main/zip/*.zip
          draft: false
          # master 分支推播設為 Pre-release，正式 Tag 則為正式版
          prerelease: ${{ github.ref_name == 'master' }}
          generate_release_notes: true
          # 確保 'latest' 標籤會被更新
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: WindowsUiAutomatorViewer-dist
          path: |
            composeApp/build/compose/binaries/main/exe/*.exe
            composeApp/build/compose/binaries/main/zip/*.zip
